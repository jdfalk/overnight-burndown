# file: .github/workflows/nightly.yml
# version: 3.0.0
#
# Three-phase matrix burndown with optional parallel provider comparison:
#
#   triage          → 1 runner. collect+triage every repo, emit tasks.json
#   dispatch-openai → 1 runner per task (matrix), uses OpenAI codex-mini
#   dispatch-claude → 1 runner per task (matrix), uses Claude haiku
#                     (only in 'anthropic' or 'compare' mode)
#   aggregate       → 1 runner. concatenate all outcomes, render digest
#
# implementer_provider choices:
#   openai    — only dispatch-openai runs (default / scheduled)
#   anthropic — only dispatch-claude runs
#   compare   — BOTH dispatch jobs run in parallel with cheapest models;
#               branches are suffixed --openai / --claude so they don't collide

name: Nightly burndown

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC = 01:00 PT / 04:00 ET
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode. dry-run is safe default; full enables auto-merge.'
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - draft-only
          - review
          - full
      implementer_provider:
        description: >
          Implementer LLM backend.
          openai = Responses API with codex-mini/gpt-5 tiers + fallback chain.
          anthropic = Claude haiku/sonnet/opus tiers (requires BURNDOWN_BOT_CLAUDE_API_KEY).
          compare = run BOTH at cheapest tier in parallel, branch names suffixed --openai/--claude.
          Scheduled nightlies always use openai.
        required: false
        default: 'openai'
        type: choice
        options:
          - openai
          - anthropic
          - compare

permissions:
  contents: read

# Single-flight: a newer trigger queues until the running one finishes.
# We deliberately do NOT cancel-in-progress — agent runs are long (5-15
# min per cell × 8 parallel × N waves), and cancelling mid-run would
# leave half-applied worktrees, dangling PRs, and burn budget without
# producing a digest.
concurrency:
  group: nightly-burndown
  cancel-in-progress: false

env:
  RUNNER_IMAGE: ghcr.io/jdfalk/burndown-runner-image:bootstrap

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Triage — one runner, emits tasks.json + a list of indices the
  # matrix will fan out on.
  # ---------------------------------------------------------------------------
  triage:
    name: Triage + emit task list
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    outputs:
      task_indices: ${{ steps.emit.outputs.task_indices }}
      task_count: ${{ steps.emit.outputs.task_count }}
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Checkout audiobook-organizer (sparse)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jdfalk/audiobook-organizer
          path: targets/audiobook-organizer
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Validate runtime credentials
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          IMPLEMENTER_PROVIDER: ${{ inputs.implementer_provider || 'openai' }}
        run: |
          set -euo pipefail
          # Triage always uses OpenAI, so that key is always required.
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_OPENAI_API_KEY secret is not set (required for triage)"
            exit 1
          fi
          openai_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models || true)
          if [ "$openai_code" != "200" ]; then
            echo "::error::OpenAI key rejected (HTTP $openai_code) — validate at platform.openai.com"
            exit 1
          fi
          echo "OpenAI key OK ($openai_code)"
          # Claude key — required for anthropic or compare modes.
          if [ "$IMPLEMENTER_PROVIDER" = "anthropic" ] || [ "$IMPLEMENTER_PROVIDER" = "compare" ]; then
            if [ -z "${CLAUDE_API_KEY:-}" ]; then
              echo "::error::BURNDOWN_BOT_CLAUDE_API_KEY secret is not set (required for provider=$IMPLEMENTER_PROVIDER)"
              exit 1
            fi
            claude_code=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "x-api-key: $CLAUDE_API_KEY" \
              -H "anthropic-version: 2023-06-01" \
              https://api.anthropic.com/v1/models || true)
            if [ "$claude_code" != "200" ]; then
              echo "::error::Claude key rejected (HTTP $claude_code) — validate at console.anthropic.com"
              exit 1
            fi
            echo "Claude key OK ($claude_code)"
          fi
          gh_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY} || true)
          if [ "$gh_code" != "200" ]; then
            echo "::error::GitHub token rejected (HTTP $gh_code)"
            exit 1
          fi
          echo "GitHub token OK ($gh_code)"

      - name: Build burndown from current commit
        working-directory: burndown
        run: go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown

      - name: Materialize GitHub App key
        env:
          BURNDOWN_BOT_PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          if [ -z "$BURNDOWN_BOT_PRIVATE_KEY" ]; then
            echo "No App key — running in dry-run-only mode."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$BURNDOWN_BOT_PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Render config (triage always uses OpenAI for cost)
        env:
          MODE: ${{ inputs.mode || 'dry-run' }}
          IMPLEMENTER_PROVIDER: openai
          WORKSPACE: ${{ github.workspace }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-state" "$RUNNER_TEMP/burndown-digest"
          if [ ! -s "$GH_APP_PEM_PATH" ]; then
            unset GH_APP_ID GH_APP_INSTALLATION_ID GH_APP_PEM_PATH
          fi
          python3 burndown/scripts/render-ci-config.py --out "$RUNNER_TEMP/config.yaml" >/dev/null
          python3 burndown/scripts/validate-config.py "$RUNNER_TEMP/config.yaml"

      - name: Run triage
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
        run: |
          "$RUNNER_TEMP/burndown" triage \
            --config "$RUNNER_TEMP/config.yaml" \
            --out "$RUNNER_TEMP/tasks.json"

      - name: Stage triage artifact (flatten paths)
        run: |
          mkdir -p "$RUNNER_TEMP/triage-stage"
          cp "$RUNNER_TEMP/tasks.json"  "$RUNNER_TEMP/triage-stage/"
          cp "$RUNNER_TEMP/config.yaml" "$RUNNER_TEMP/triage-stage/"
          if [ -d "$RUNNER_TEMP/burndown-state" ]; then
            cp -r "$RUNNER_TEMP/burndown-state" "$RUNNER_TEMP/triage-stage/"
          fi
          if [ -f "$RUNNER_TEMP/burndown-state/state.json" ]; then
            cp "$RUNNER_TEMP/burndown-state/state.json" "$RUNNER_TEMP/triage-stage/"
          fi

      - name: Upload tasks.json + config + state
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage-stage/
          retention-days: 7

      - name: Emit task indices for matrix fanout
        id: emit
        run: |
          set -eu
          count=$(jq '.tasks | length' "$RUNNER_TEMP/tasks.json")
          if [ "$count" -gt 256 ]; then
            echo "::warning::triage produced $count tasks, capping matrix at 256"
            count=256
          fi
          if [ "$count" -eq 0 ]; then
            indices='[]'
          else
            indices=$(jq -cn --argjson n "$count" '[range(0; $n)]')
          fi
          echo "task_count=$count" >> "$GITHUB_OUTPUT"
          echo "task_indices=$indices" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Phase 2a: Dispatch (OpenAI) — skipped when implementer_provider=anthropic.
  # Branches are suffixed --openai in compare mode; plain names otherwise.
  # ---------------------------------------------------------------------------
  dispatch-openai:
    name: "Dispatch [OpenAI] task ${{ matrix.index }}"
    needs: triage
    if: >-
      needs.triage.outputs.task_count != '0' &&
      inputs.implementer_provider != 'anthropic'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        index: ${{ fromJson(needs.triage.outputs.task_indices) }}
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Checkout audiobook-organizer (sparse)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jdfalk/audiobook-organizer
          path: targets/audiobook-organizer
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Validate OpenAI key
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_OPENAI_API_KEY is not set"
            exit 1
          fi
          code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models || true)
          [ "$code" = "200" ] || { echo "::error::OpenAI key rejected (HTTP $code)"; exit 1; }
          echo "OpenAI key OK"

      - name: Build burndown from current commit
        working-directory: burndown
        run: go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown

      - name: Download triage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Stage triage outputs
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/burndown-state"
          cp "$RUNNER_TEMP/triage/tasks.json" "$RUNNER_TEMP/tasks.json"
          if [ -d "$RUNNER_TEMP/triage/burndown-state" ]; then
            cp -r "$RUNNER_TEMP/triage/burndown-state/." "$RUNNER_TEMP/burndown-state/"
          fi
          cp "$RUNNER_TEMP/triage/state.json" "$RUNNER_TEMP/burndown-state/state.json" 2>/dev/null || true

      - name: Render OpenAI config
        env:
          MODE: ${{ inputs.mode || 'dry-run' }}
          IMPLEMENTER_PROVIDER: openai
          # In compare mode, cap to cheapest model only so cost is comparable.
          CHEAPEST_ONLY: ${{ inputs.implementer_provider == 'compare' && 'true' || 'false' }}
          WORKSPACE: ${{ github.workspace }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
        run: |
          if [ ! -s "$GH_APP_PEM_PATH" ]; then
            unset GH_APP_ID GH_APP_INSTALLATION_ID GH_APP_PEM_PATH
          fi
          python3 burndown/scripts/render-ci-config.py --out "$RUNNER_TEMP/config.yaml" >/dev/null

      - name: Materialize GitHub App key
        env:
          BURNDOWN_BOT_PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          [ -z "$BURNDOWN_BOT_PRIVATE_KEY" ] && exit 0
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$BURNDOWN_BOT_PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Dispatch task ${{ matrix.index }} (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
        run: |
          # In compare mode add --openai suffix so the branch doesn't collide
          # with the parallel Claude run for the same task.
          suffix=""
          [ "${{ inputs.implementer_provider }}" = "compare" ] && suffix="--branch-suffix openai"
          "$RUNNER_TEMP/burndown" dispatch-one \
            --config "$RUNNER_TEMP/config.yaml" \
            --task-file "$RUNNER_TEMP/tasks.json" \
            --task-index ${{ matrix.index }} \
            --out "$RUNNER_TEMP/outcome-openai-${{ matrix.index }}.json" \
            $suffix

      - name: Stage outcome
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/outcome-stage"
          cp "$RUNNER_TEMP/outcome-openai-${{ matrix.index }}.json" \
             "$RUNNER_TEMP/outcome-stage/" 2>/dev/null || true

      - name: Upload outcome
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-outcome-openai-${{ matrix.index }}
          path: ${{ runner.temp }}/outcome-stage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 2b: Dispatch (Claude) — runs only when implementer_provider is
  # 'anthropic' or 'compare'. Branches suffixed --claude in compare mode.
  # ---------------------------------------------------------------------------
  dispatch-claude:
    name: "Dispatch [Claude] task ${{ matrix.index }}"
    needs: triage
    if: >-
      needs.triage.outputs.task_count != '0' &&
      (inputs.implementer_provider == 'anthropic' || inputs.implementer_provider == 'compare')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        index: ${{ fromJson(needs.triage.outputs.task_indices) }}
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Checkout audiobook-organizer (sparse)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jdfalk/audiobook-organizer
          path: targets/audiobook-organizer
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Validate Claude key
        env:
          CLAUDE_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_CLAUDE_API_KEY is not set"
            exit 1
          fi
          code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            https://api.anthropic.com/v1/models || true)
          [ "$code" = "200" ] || { echo "::error::Claude key rejected (HTTP $code)"; exit 1; }
          echo "Claude key OK"

      - name: Build burndown from current commit
        working-directory: burndown
        run: go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown

      - name: Download triage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Stage triage outputs
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/burndown-state"
          cp "$RUNNER_TEMP/triage/tasks.json" "$RUNNER_TEMP/tasks.json"
          if [ -d "$RUNNER_TEMP/triage/burndown-state" ]; then
            cp -r "$RUNNER_TEMP/triage/burndown-state/." "$RUNNER_TEMP/burndown-state/"
          fi
          cp "$RUNNER_TEMP/triage/state.json" "$RUNNER_TEMP/burndown-state/state.json" 2>/dev/null || true

      - name: Render Claude config
        env:
          MODE: ${{ inputs.mode || 'dry-run' }}
          IMPLEMENTER_PROVIDER: anthropic
          # Always cheapest-only for Claude runs; haiku is the base model.
          CHEAPEST_ONLY: "true"
          WORKSPACE: ${{ github.workspace }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
        run: |
          if [ ! -s "$GH_APP_PEM_PATH" ]; then
            unset GH_APP_ID GH_APP_INSTALLATION_ID GH_APP_PEM_PATH
          fi
          python3 burndown/scripts/render-ci-config.py --out "$RUNNER_TEMP/config.yaml" >/dev/null

      - name: Materialize GitHub App key
        env:
          BURNDOWN_BOT_PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          [ -z "$BURNDOWN_BOT_PRIVATE_KEY" ] && exit 0
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$BURNDOWN_BOT_PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Dispatch task ${{ matrix.index }} (Claude)
        env:
          # The Anthropic SDK reads ANTHROPIC_API_KEY; map our secret to it.
          ANTHROPIC_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
        run: |
          # In compare mode add --claude suffix; in anthropic-only mode,
          # branches keep their natural names.
          suffix=""
          [ "${{ inputs.implementer_provider }}" = "compare" ] && suffix="--branch-suffix claude"
          "$RUNNER_TEMP/burndown" dispatch-one \
            --config "$RUNNER_TEMP/config.yaml" \
            --task-file "$RUNNER_TEMP/tasks.json" \
            --task-index ${{ matrix.index }} \
            --out "$RUNNER_TEMP/outcome-claude-${{ matrix.index }}.json" \
            $suffix

      - name: Stage outcome
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/outcome-stage"
          cp "$RUNNER_TEMP/outcome-claude-${{ matrix.index }}.json" \
             "$RUNNER_TEMP/outcome-stage/" 2>/dev/null || true

      - name: Upload outcome
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-outcome-claude-${{ matrix.index }}
          path: ${{ runner.temp }}/outcome-stage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 3: Aggregate — runs even if some dispatch cells failed, so the
  # digest always reports the full picture. Downloads outcomes from both
  # providers; missing sets (skipped jobs) are silently ignored.
  # ---------------------------------------------------------------------------
  aggregate:
    name: Aggregate digest
    needs: [triage, dispatch-openai, dispatch-claude]
    if: always() && needs.triage.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Build burndown from current commit
        working-directory: burndown
        run: go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown

      - name: Download triage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Download OpenAI outcome artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: burndown-outcome-openai-*
          merge-multiple: true
          path: ${{ runner.temp }}/outcomes
        continue-on-error: true

      - name: Download Claude outcome artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: burndown-outcome-claude-*
          merge-multiple: true
          path: ${{ runner.temp }}/outcomes
        continue-on-error: true

      - name: Inspect outcome JSONs (per-task fail summary)
        if: always()
        run: |
          set -euo pipefail
          shopt -s nullglob
          fails=0 successes=0
          echo "=== Per-task outcomes ==="
          for f in "$RUNNER_TEMP/outcomes/"*.json; do
            status=$(jq -r '.Status // empty' "$f")
            title=$(jq -r '.Task.Source.Title // empty' "$f")
            err=$(jq -r '.Error // empty' "$f")
            branch=$(jq -r '.Branch // empty' "$f")
            if [ "$status" = "failed" ]; then
              fails=$((fails+1))
              printf 'FAIL  [%s] %s\n' "$branch" "$title"
              [ -n "$err" ] && printf '      error: %s\n' "$err"
            else
              successes=$((successes+1))
              printf 'OK    [%s] %s (%s)\n' "$branch" "$title" "$status"
            fi
          done
          echo "=== Totals: $successes ok / $fails failed ==="

      - name: Aggregate
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-digest"
          "$RUNNER_TEMP/burndown" aggregate \
            --config "$RUNNER_TEMP/triage/config.yaml" \
            --triage-file "$RUNNER_TEMP/triage/tasks.json" \
            --outcomes-dir "$RUNNER_TEMP/outcomes" \
            --digest-out "$RUNNER_TEMP/burndown-digest/digest.md"

      - name: Publish digest to job summary
        if: always()
        run: |
          set -euo pipefail
          if [ -s "$RUNNER_TEMP/burndown-digest/digest.md" ]; then
            cat "$RUNNER_TEMP/burndown-digest/digest.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No digest produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-digest-${{ github.run_id }}
          path: ${{ runner.temp }}/burndown-digest/
          if-no-files-found: warn
          retention-days: 30
