# file: .github/workflows/nightly.yml
# version: 2.0.0
#
# Three-phase matrix burndown:
#
#   triage    → 1 runner. collect+triage every repo, emit tasks.json
#   dispatch  → 1 runner per task (matrix), worktree+agent+ghops
#   aggregate → 1 runner. concatenate outcomes, render digest
#
# Each phase uses ghcr.io/jdfalk/burndown-runner-image (public, no auth).
# `triage` writes tasks.json + uploads it as an artifact; `dispatch` uses
# fromJson(needs.triage.outputs.task_indices) to fan out one cell per
# task index. `aggregate` always runs (even if some dispatch cells fail)
# and downloads every outcome-*.json artifact to render a unified digest.
#
# The legacy single-runner Runner.Run() entry point is still on the
# binary (`burndown run`) for ad-hoc local use; this workflow uses only
# the matrix subcommands.

name: Nightly burndown

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC = 01:00 PT / 04:00 ET
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (overrides config). dry-run is the safe default.'
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - draft-only
          - full

permissions:
  contents: read

# Single-flight: a newer trigger queues until the running one finishes.
# We deliberately do NOT cancel-in-progress — agent runs are long (5-15
# min per cell × 8 parallel × N waves), and cancelling mid-run would
# leave half-applied worktrees, dangling PRs, and burn budget without
# producing a digest.
concurrency:
  group: nightly-burndown
  cancel-in-progress: false

env:
  RUNNER_IMAGE: ghcr.io/jdfalk/burndown-runner-image:bootstrap

defaults:
  run:
    # Container default is /bin/sh (dash on Ubuntu) which lacks `pipefail`.
    # Force bash so `set -euo pipefail` works in every step.
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Triage — one runner, emits tasks.json + a list of indices the
  # matrix will fan out on.
  # ---------------------------------------------------------------------------
  triage:
    name: Triage + emit task list
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    outputs:
      task_indices: ${{ steps.emit.outputs.task_indices }}
      task_count: ${{ steps.emit.outputs.task_count }}
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Checkout audiobook-organizer (sparse)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jdfalk/audiobook-organizer
          path: targets/audiobook-organizer
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Validate runtime credentials
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # OpenAI key
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_OPENAI_API_KEY secret is not set"
            exit 1
          fi
          openai_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models || true)
          if [ "$openai_code" != "200" ]; then
            echo "::error::OpenAI key rejected (HTTP $openai_code) — validate at platform.openai.com"
            exit 1
          fi
          echo "OpenAI key OK ($openai_code)"
          # GitHub token
          gh_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY} || true)
          if [ "$gh_code" != "200" ]; then
            echo "::error::GitHub token rejected (HTTP $gh_code)"
            exit 1
          fi
          echo "GitHub token OK ($gh_code)"

      - name: Download burndown binary (latest prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pull the most recent release (incl. prereleases) and grab the
          # Linux/x86_64 archive — the runner image is amd64. Falls back to
          # `go build` if no release exists yet so the matrix isn't blocked
          # while the prerelease workflow is bootstrapping.
          tag=$(gh release list --repo jdfalk/overnight-burndown --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$tag" ]; then
            echo "::warning::no overnight-burndown release found; falling back to go build"
            ( cd burndown && go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown )
            exit 0
          fi
          asset=$(gh release view "$tag" --repo jdfalk/overnight-burndown --json assets \
            --jq '.assets[].name' | grep -E "burndown_.*_Linux_x86_64\\.tar\\.gz$" | head -1)
          if [ -z "$asset" ]; then
            echo "::error::release $tag has no Linux/x86_64 archive"
            exit 1
          fi
          tmp=$(mktemp -d)
          gh release download "$tag" --repo jdfalk/overnight-burndown --pattern "$asset" --dir "$tmp"
          tar -xzf "$tmp/$asset" -C "$tmp"
          # Archive contains a binary named burndown_Linux_x86_64; rename to plain `burndown`.
          mv "$tmp/burndown_Linux_x86_64" "$RUNNER_TEMP/burndown"
          chmod +x "$RUNNER_TEMP/burndown"
          rm -rf "$tmp"
          "$RUNNER_TEMP/burndown" --version || true

      - name: Materialize GitHub App key
        env:
          BURNDOWN_BOT_PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          if [ -z "$BURNDOWN_BOT_PRIVATE_KEY" ]; then
            echo "No App key — running in dry-run-only mode."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$BURNDOWN_BOT_PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Render config
        env:
          MODE: ${{ inputs.mode || 'dry-run' }}
          WORKSPACE: ${{ github.workspace }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-state" "$RUNNER_TEMP/burndown-digest"
          if [ ! -s "$GH_APP_PEM_PATH" ]; then
            unset GH_APP_ID GH_APP_INSTALLATION_ID GH_APP_PEM_PATH
          fi
          python3 burndown/scripts/render-ci-config.py --out "$RUNNER_TEMP/config.yaml" >/dev/null
          python3 burndown/scripts/validate-config.py "$RUNNER_TEMP/config.yaml"

      - name: Run triage
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
        run: |
          "$RUNNER_TEMP/burndown" triage \
            --config "$RUNNER_TEMP/config.yaml" \
            --out "$RUNNER_TEMP/tasks.json"

      - name: Stage triage artifact (flatten paths)
        run: |
          # upload-artifact v4 preserves the absolute path of any file outside
          # the workspace, which would land tasks.json at <download-dir>/__w/_temp/
          # instead of <download-dir>/. Stage everything into a single dir so
          # the download side gets a flat layout.
          mkdir -p "$RUNNER_TEMP/triage-stage"
          cp "$RUNNER_TEMP/tasks.json"   "$RUNNER_TEMP/triage-stage/"
          cp "$RUNNER_TEMP/config.yaml"  "$RUNNER_TEMP/triage-stage/"
          if [ -f "$RUNNER_TEMP/burndown-state/state.json" ]; then
            cp "$RUNNER_TEMP/burndown-state/state.json" "$RUNNER_TEMP/triage-stage/"
          fi

      - name: Upload tasks.json + config + state
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage-stage/
          retention-days: 7

      - name: Emit task indices for matrix fanout
        id: emit
        run: |
          set -eu
          # GitHub Actions matrix has a 256-cell cap; we fan out on
          # array indices, not whole task objects, both to stay under
          # the cap and to keep job names readable.
          count=$(jq '.tasks | length' "$RUNNER_TEMP/tasks.json")
          if [ "$count" -gt 256 ]; then
            echo "::warning::triage produced $count tasks, capping matrix at 256"
            count=256
          fi
          if [ "$count" -eq 0 ]; then
            indices='[]'
          else
            indices=$(jq -cn --argjson n "$count" '[range(0; $n)]')
          fi
          echo "task_count=$count" >> "$GITHUB_OUTPUT"
          echo "task_indices=$indices" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Phase 2: Dispatch — one runner per task. The matrix is gated on the
  # triage job producing at least one dispatchable task.
  # ---------------------------------------------------------------------------
  dispatch:
    name: Dispatch task
    needs: triage
    if: needs.triage.outputs.task_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    strategy:
      fail-fast: false
      # The agent uses /v1/responses with PreviousResponseID, so iter N+1
      # only sends the new function_call_output items — full history
      # stays server-side. That collapses per-call token cost and lets us
      # safely run 8 cells in parallel under codex-mini's TPM bucket.
      # Lower if 429s recur; raise after observing token usage in a few
      # nightlies.
      max-parallel: 8
      matrix:
        index: ${{ fromJson(needs.triage.outputs.task_indices) }}
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Checkout audiobook-organizer (sparse)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jdfalk/audiobook-organizer
          path: targets/audiobook-organizer
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Validate runtime credentials
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_OPENAI_API_KEY secret is not set"
            exit 1
          fi
          openai_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models || true)
          if [ "$openai_code" != "200" ]; then
            echo "::error::OpenAI key rejected (HTTP $openai_code)"
            exit 1
          fi
          echo "OpenAI key OK ($openai_code)"
          gh_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY} || true)
          if [ "$gh_code" != "200" ]; then
            echo "::error::GitHub token rejected (HTTP $gh_code)"
            exit 1
          fi
          echo "GitHub token OK ($gh_code)"

      - name: Download burndown binary (latest prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pull the most recent release (incl. prereleases) and grab the
          # Linux/x86_64 archive — the runner image is amd64. Falls back to
          # `go build` if no release exists yet so the matrix isn't blocked
          # while the prerelease workflow is bootstrapping.
          tag=$(gh release list --repo jdfalk/overnight-burndown --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$tag" ]; then
            echo "::warning::no overnight-burndown release found; falling back to go build"
            ( cd burndown && go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown )
            exit 0
          fi
          asset=$(gh release view "$tag" --repo jdfalk/overnight-burndown --json assets \
            --jq '.assets[].name' | grep -E "burndown_.*_Linux_x86_64\\.tar\\.gz$" | head -1)
          if [ -z "$asset" ]; then
            echo "::error::release $tag has no Linux/x86_64 archive"
            exit 1
          fi
          tmp=$(mktemp -d)
          gh release download "$tag" --repo jdfalk/overnight-burndown --pattern "$asset" --dir "$tmp"
          tar -xzf "$tmp/$asset" -C "$tmp"
          # Archive contains a binary named burndown_Linux_x86_64; rename to plain `burndown`.
          mv "$tmp/burndown_Linux_x86_64" "$RUNNER_TEMP/burndown"
          chmod +x "$RUNNER_TEMP/burndown"
          rm -rf "$tmp"
          "$RUNNER_TEMP/burndown" --version || true

      - name: Download triage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Stage triage outputs
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/burndown-state"
          cp "$RUNNER_TEMP/triage/config.yaml" "$RUNNER_TEMP/config.yaml"
          cp "$RUNNER_TEMP/triage/tasks.json" "$RUNNER_TEMP/tasks.json"
          cp "$RUNNER_TEMP/triage/state.json" "$RUNNER_TEMP/burndown-state/state.json" || true

      - name: Materialize GitHub App key (per-cell)
        env:
          BURNDOWN_BOT_PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          [ -z "$BURNDOWN_BOT_PRIVATE_KEY" ] && exit 0
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$BURNDOWN_BOT_PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Dispatch task ${{ matrix.index }}
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BURNDOWN_BOT_ANTHROPIC_API_KEY }}
        run: |
          "$RUNNER_TEMP/burndown" dispatch-one \
            --config "$RUNNER_TEMP/config.yaml" \
            --task-file "$RUNNER_TEMP/tasks.json" \
            --task-index ${{ matrix.index }} \
            --out "$RUNNER_TEMP/outcome-${{ matrix.index }}.json"

      - name: Stage outcome (flatten path)
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/outcome-stage"
          cp "$RUNNER_TEMP/outcome-${{ matrix.index }}.json" \
             "$RUNNER_TEMP/outcome-stage/" 2>/dev/null || true

      - name: Upload outcome
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-outcome-${{ matrix.index }}
          path: ${{ runner.temp }}/outcome-stage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 3: Aggregate — runs even if some dispatch cells failed, so the
  # digest always reports the full picture.
  # ---------------------------------------------------------------------------
  aggregate:
    name: Aggregate digest
    needs: [triage, dispatch]
    if: always() && needs.triage.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/jdfalk/burndown-runner-image:bootstrap
    steps:
      - name: Checkout overnight-burndown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: burndown

      - name: Validate runtime credentials
        env:
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::BURNDOWN_BOT_OPENAI_API_KEY secret is not set"
            exit 1
          fi
          openai_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models || true)
          if [ "$openai_code" != "200" ]; then
            echo "::error::OpenAI key rejected (HTTP $openai_code)"
            exit 1
          fi
          echo "OpenAI key OK ($openai_code)"
          gh_code=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY} || true)
          if [ "$gh_code" != "200" ]; then
            echo "::error::GitHub token rejected (HTTP $gh_code)"
            exit 1
          fi
          echo "GitHub token OK ($gh_code)"

      - name: Download burndown binary (latest prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pull the most recent release (incl. prereleases) and grab the
          # Linux/x86_64 archive — the runner image is amd64. Falls back to
          # `go build` if no release exists yet so the matrix isn't blocked
          # while the prerelease workflow is bootstrapping.
          tag=$(gh release list --repo jdfalk/overnight-burndown --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$tag" ]; then
            echo "::warning::no overnight-burndown release found; falling back to go build"
            ( cd burndown && go build -o "$RUNNER_TEMP/burndown" ./cmd/burndown )
            exit 0
          fi
          asset=$(gh release view "$tag" --repo jdfalk/overnight-burndown --json assets \
            --jq '.assets[].name' | grep -E "burndown_.*_Linux_x86_64\\.tar\\.gz$" | head -1)
          if [ -z "$asset" ]; then
            echo "::error::release $tag has no Linux/x86_64 archive"
            exit 1
          fi
          tmp=$(mktemp -d)
          gh release download "$tag" --repo jdfalk/overnight-burndown --pattern "$asset" --dir "$tmp"
          tar -xzf "$tmp/$asset" -C "$tmp"
          # Archive contains a binary named burndown_Linux_x86_64; rename to plain `burndown`.
          mv "$tmp/burndown_Linux_x86_64" "$RUNNER_TEMP/burndown"
          chmod +x "$RUNNER_TEMP/burndown"
          rm -rf "$tmp"
          "$RUNNER_TEMP/burndown" --version || true

      - name: Download triage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Download every outcome artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: burndown-outcome-*
          merge-multiple: true
          path: ${{ runner.temp }}/outcomes

      - name: Inspect outcome JSONs (per-task fail summary)
        if: always()
        run: |
          set -euo pipefail
          shopt -s nullglob
          fails=0
          successes=0
          echo "=== Per-task outcomes ==="
          for f in "$RUNNER_TEMP/outcomes/"outcome-*.json; do
            status=$(jq -r '.Status // empty' "$f")
            title=$(jq -r '.Task.Source.Title // empty' "$f")
            err=$(jq -r '.Error // empty' "$f")
            branch=$(jq -r '.Branch // empty' "$f")
            if [ "$status" = "failed" ]; then
              fails=$((fails+1))
              printf '%s\n' "FAIL  [$branch] $title"
              [ -n "$err" ] && printf '%s\n' "       error: $err"
            else
              successes=$((successes+1))
              printf '%s\n' "OK    [$branch] $title ($status)"
            fi
          done
          echo "=== Totals: $successes ok / $fails failed ==="

      - name: Aggregate
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-digest"
          "$RUNNER_TEMP/burndown" aggregate \
            --config "$RUNNER_TEMP/triage/config.yaml" \
            --triage-file "$RUNNER_TEMP/triage/tasks.json" \
            --outcomes-dir "$RUNNER_TEMP/outcomes" \
            --digest-out "$RUNNER_TEMP/burndown-digest/digest.md"

      - name: Publish digest to job summary
        if: always()
        run: |
          set -euo pipefail
          if [ -s "$RUNNER_TEMP/burndown-digest/digest.md" ]; then
            cat "$RUNNER_TEMP/burndown-digest/digest.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ No digest produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: burndown-digest-${{ github.run_id }}
          path: ${{ runner.temp }}/burndown-digest/
          if-no-files-found: warn
          retention-days: 30
